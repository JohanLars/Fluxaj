spring.application.name=fluxaj
server.port=8080

# =========================
# MYSQL CONFIG
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/fluxaj?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=fluxaj
spring.datasource.password=123456789

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =========================
# GOOGLE OAUTH2
# =========================

google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =========================
# EMAIL (GMAIL SMTP)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=fluxaj1@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================
# SECURITY (AES KEY)
# =========================
config.security.secret-key=12345678901234567890123456789012